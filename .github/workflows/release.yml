---
name: Package stable release

# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release-version:
        description: Stable GitHub Release tag to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: >-
    release-linux-${{
      inputs.release-version || github.event.release.tag_name
    }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate stable release
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !github.event.release.prerelease
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: >-
        ${{ inputs.release-version || github.event.release.tag_name }}
    steps:
      - name: Validate published stable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          [[ "$RELEASE_VERSION" =~ ^[0-9]{8}\.[0-9]+$ ]] || {
            echo "::error::Invalid stable release version: $RELEASE_VERSION"
            exit 1
          }
          release="$(gh release view "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" --json isDraft,isPrerelease)"
          [[ "$(jq -r '.isDraft' <<< "$release")" == "false" ]] || {
            echo "::error::Release $RELEASE_VERSION is still a draft."
            exit 1
          }
          [[ "$(jq -r '.isPrerelease' <<< "$release")" == "false" ]] || {
            echo "::error::Release $RELEASE_VERSION is a prerelease."
            exit 1
          }

  release:
    name: Build and publish Linux packages
    needs: validate-release
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !github.event.release.prerelease
    permissions:
      contents: write
    uses: >- # master
      timmo001/workflows/.github/workflows/release-bun-cli-linux.yml@405726c0d3241169dc241682ffa91176f9a82916
    with:
      binary-name: context
      package-name: context
      entrypoint: src/index.ts
      package-config: .scripts/linux/nfpm.yaml
      bun-version: 1.3.14
      smoke-test-arguments: |-
        help
        stack --json
      package-prepare-command: |-
        mkdir -p .scripts/linux/completions
        ./dist/release/root/context completions bash > .scripts/linux/completions/context.bash
        ./dist/release/root/context completions fish > .scripts/linux/completions/context.fish
        ./dist/release/root/context completions zsh > .scripts/linux/completions/_context
      release-version: >-
        ${{ inputs.release-version || github.event.release.tag_name }}
      source-ref: >-
        ${{ inputs.release-version || github.event.release.tag_name }}
      existing-release: true

  prepare-aur:
    name: Prepare AUR package (context-bin)
    needs: release
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: >-
        ${{ inputs.release-version || github.event.release.tag_name }}
    steps:
      - name: Check out release source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_VERSION }}
      - name: Prepare context-bin
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          .scripts/linux/prepare-aur-bin.sh "$RELEASE_VERSION"
          "${{ runner.temp }}/aur-package"
      - name: Upload context-bin
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: aur-context-bin-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/aur-package
          if-no-files-found: error
          retention-days: 1

  publish-aur:
    name: Publish AUR (context-bin)
    needs: prepare-aur
    uses: >- # master
      timmo001/workflows/.github/workflows/publish-aur.yml@405726c0d3241169dc241682ffa91176f9a82916
    with:
      package-name: context-bin
      artifact-name: aur-context-bin-${{ github.run_id }}-${{ github.run_attempt }}
      auxiliary-file-paths: |-
        context.bash
        context.fish
        _context
        LICENSE
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
