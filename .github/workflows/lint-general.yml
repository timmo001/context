---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@f879a1f9fefe5f940b9dd14cdf84e04b81c8a417 # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@f879a1f9fefe5f940b9dd14cdf84e04b81c8a417 # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@f879a1f9fefe5f940b9dd14cdf84e04b81c8a417 # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@f879a1f9fefe5f940b9dd14cdf84e04b81c8a417 # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@f879a1f9fefe5f940b9dd14cdf84e04b81c8a417 # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@f879a1f9fefe5f940b9dd14cdf84e04b81c8a417 # master
    with:
      scandir: ./.scripts
      severity: warning
