---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@c7e580685718ad4e83b85325d14e1970f6f44661 # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@c7e580685718ad4e83b85325d14e1970f6f44661 # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@c7e580685718ad4e83b85325d14e1970f6f44661 # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@c7e580685718ad4e83b85325d14e1970f6f44661 # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@c7e580685718ad4e83b85325d14e1970f6f44661 # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@c7e580685718ad4e83b85325d14e1970f6f44661 # master
    with:
      scandir: ./.scripts
      severity: warning
