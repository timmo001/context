---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@90243d15ea24d2e156f26341706f587c2559bedc # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@90243d15ea24d2e156f26341706f587c2559bedc # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@90243d15ea24d2e156f26341706f587c2559bedc # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@90243d15ea24d2e156f26341706f587c2559bedc # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@90243d15ea24d2e156f26341706f587c2559bedc # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@90243d15ea24d2e156f26341706f587c2559bedc # master
    with:
      scandir: ./.scripts
      severity: warning
