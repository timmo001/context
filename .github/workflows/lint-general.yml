---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@4cedc6db32c48335c71bab8ff2d4ac57470605fb # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@4cedc6db32c48335c71bab8ff2d4ac57470605fb # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@4cedc6db32c48335c71bab8ff2d4ac57470605fb # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@4cedc6db32c48335c71bab8ff2d4ac57470605fb # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@4cedc6db32c48335c71bab8ff2d4ac57470605fb # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@4cedc6db32c48335c71bab8ff2d4ac57470605fb # master
    with:
      scandir: ./.scripts
      severity: warning
