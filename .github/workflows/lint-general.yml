---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831 # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831 # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831 # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831 # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831 # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831 # master
    with:
      scandir: ./.scripts
      severity: warning
