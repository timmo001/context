---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@0595fd1326ea46eb611baadc206cc2fd37259361 # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@0595fd1326ea46eb611baadc206cc2fd37259361 # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@0595fd1326ea46eb611baadc206cc2fd37259361 # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@0595fd1326ea46eb611baadc206cc2fd37259361 # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@0595fd1326ea46eb611baadc206cc2fd37259361 # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@0595fd1326ea46eb611baadc206cc2fd37259361 # master
    with:
      scandir: ./.scripts
      severity: warning
