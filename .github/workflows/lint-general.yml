---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@a89dc2dc0bd3e776ac4b92757a384257f265e61c # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@a89dc2dc0bd3e776ac4b92757a384257f265e61c # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@a89dc2dc0bd3e776ac4b92757a384257f265e61c # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@a89dc2dc0bd3e776ac4b92757a384257f265e61c # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@a89dc2dc0bd3e776ac4b92757a384257f265e61c # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@a89dc2dc0bd3e776ac4b92757a384257f265e61c # master
    with:
      scandir: ./.scripts
      severity: warning
