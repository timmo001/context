---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@b1d37bf9247fadf3209395cd6bdcbd55c9989370 # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@b1d37bf9247fadf3209395cd6bdcbd55c9989370 # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@b1d37bf9247fadf3209395cd6bdcbd55c9989370 # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@b1d37bf9247fadf3209395cd6bdcbd55c9989370 # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@b1d37bf9247fadf3209395cd6bdcbd55c9989370 # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@b1d37bf9247fadf3209395cd6bdcbd55c9989370 # master
    with:
      scandir: ./.scripts
      severity: warning
