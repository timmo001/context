---
name: Lint general

# yamllint disable-line rule:truthy
on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  actionlint:
    uses: timmo001/workflows/.github/workflows/lint-actionlint.yml@9e30c90e384c2c1cde05f541bf84e867a2675d05 # master

  markdownlint:
    uses: timmo001/workflows/.github/workflows/lint-markdownlint.yml@9e30c90e384c2c1cde05f541bf84e867a2675d05 # master

  yamllint:
    uses: timmo001/workflows/.github/workflows/lint-yamllint.yml@9e30c90e384c2c1cde05f541bf84e867a2675d05 # master

  jsonlint:
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@9e30c90e384c2c1cde05f541bf84e867a2675d05 # master

  markdown-links:
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@9e30c90e384c2c1cde05f541bf84e867a2675d05 # master

  shellcheck:
    uses: timmo001/workflows/.github/workflows/lint-shellcheck.yml@9e30c90e384c2c1cde05f541bf84e867a2675d05 # master
    with:
      scandir: ./.scripts
      severity: warning
